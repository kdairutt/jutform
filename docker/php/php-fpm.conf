[www]
; Pool tuned for memory-constrained environments
pm = static
pm.max_children = 4
pm.status_path = /fpm-status

; Slow log — threshold 3 seconds
slowlog = /var/log/php/php-fpm-slow.log
request_slowlog_timeout = 3s

; Terminate requests that run longer than 5 minutes
request_terminate_timeout = 300s

; Access log with timing info
access.log = /var/log/php/php-fpm-access.log
access.format = "%R - %u %t \"%m %r%Q%q\" %s %f %{mili}d %{kilo}M %C%%"
