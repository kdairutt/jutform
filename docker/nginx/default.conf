upstream php_backend {
    server php-fpm:9000;
}

server {
    listen 80;
    server_name localhost;

    root /var/www/frontend;
    index index.html;

    # PHP-FPM status page
    location = /fpm-status {
        access_log off;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/fpm-status;
        fastcgi_pass php_backend;
    }

    # API requests -> PHP backend
    location /api/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_pass php_backend;
        fastcgi_read_timeout 300s;
    }

    # Internal admin endpoints -> PHP backend
    location /internal/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTP_X_FORWARDED_FOR $remote_addr;
        fastcgi_pass php_backend;
    }

    # Admin panel -> PHP backend
    location /admin/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_pass php_backend;
    }

    # Frontend SPA - serve index.html for all non-API, non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
